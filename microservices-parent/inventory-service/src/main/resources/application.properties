spring.application.name=inventory-service
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/inventory_service
spring.datasource.username=root
spring.datasource.password=Mahira@123
spring.jpa.hibernate.ddl-auto=create-drop
  //dont use this is production. this is only for demo purpose

//Dialect is used to convert HQL to native database. It is a translator to convert generic 
//operations and hql queries to specific native SQL format required by underlying database.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

server.port=0

eureka.client.serviceUrl.defaultZone = http://localhost:8761/eureka
eureka.instance.prefer-ip-address=true
eureka.instance.ip-address=127.0.0.1
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}
